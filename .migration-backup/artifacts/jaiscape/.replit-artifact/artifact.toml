kind = "web"
previewPath = "/"
title = "Jaiscape — Jaisalmer Tourism"
version = "1.0.0"
id = "artifacts/jaiscape"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18196

[services.development]
run = "pnpm --filter @workspace/jaiscape run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jaiscape", "run", "build" ]
publicDir = "artifacts/jaiscape/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18196"
BASE_PATH = "/"
